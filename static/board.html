<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HBM — Доска</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;font-family:system-ui,sans-serif}
.tb{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;padding:0 10px;gap:6px;z-index:10;border-bottom:1px solid #555}
.tb a{color:#60a5fa;text-decoration:none;font-size:.82em}
.tb .sep{width:1px;height:22px;background:#555}
.tb button{padding:5px 10px;border:none;border-radius:5px;cursor:pointer;font-size:.8em;font-weight:600;background:#444;color:#eee}
.tb button:hover{background:#555}
.tb button.act{background:#3b82f6;color:#fff}
.cb{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0}
.cb.act{border-color:#fff}
input[type=range]{width:70px;accent-color:#3b82f6}
canvas{position:fixed;top:44px;left:0}
.st{position:fixed;bottom:6px;right:10px;font-size:.7em;opacity:.5}
.tip{position:fixed;bottom:6px;left:10px;font-size:.7em;opacity:.4}
</style></head><body>
<div class="tb" id="toolbar">
<a id="backLink" href="/hbm_tutor.html">← Назад</a><div class="sep"></div>
<button id="bDraw" class="act" onclick="setTool('draw')">✏️ P</button>
<button id="bErase" onclick="setTool('erase')">🧹 E</button>
<button id="bMove" onclick="setTool('move')">✋ M</button>
<div class="sep"></div>
<div id="colors"></div>
<div class="sep"></div>
<span style="color:#aaa;font-size:.78em">Толщина</span>
<input type="range" id="size" min="1" max="24" value="3">
<div class="sep"></div>
<button onclick="doUndo()">↩️</button>
<button id="btnClear" onclick="doClear()">🗑</button>
<div class="sep"></div>
<button id="bTheme" onclick="toggleTheme()">🌙</button>
<button onclick="resetView()">⊙</button>
</div>
<canvas id="c"></canvas>
<div class="st" id="status">Подключение...</div>
<div class="tip">Колесо=зум · Space/СКМ+тащить=навигация · Ctrl+Z=отмена</div>
<script src="/api.js"></script>
<script>
const Q=new URLSearchParams(location.search),SID=Q.get('id');
if(!SID){location.href='/hbm_tutor.html';throw''}
const R=role();
document.getElementById('backLink').href=R==='student'?'/student_lk.html':R==='parent'?'/parent_lk.html':'/student.html?id='+SID;
if(R==='student'||R==='parent')document.getElementById('btnClear').style.display='none';

let dark=localStorage.getItem('board_theme')!=='light';
function applyTheme(){
    document.body.style.background=dark?'#1a1a2e':'#fff';
    const tb=document.getElementById('toolbar');tb.style.background=dark?'#16213e':'#e8e8e8';tb.style.color=dark?'#eee':'#222';
    document.getElementById('bTheme').textContent=dark?'🌙':'☀️';redraw()}
function toggleTheme(){dark=!dark;localStorage.setItem('board_theme',dark?'dark':'light');applyTheme()}

const COLORS=['#e2e8f0','#222222','#3b82f6','#ef4444','#10b981','#f59e0b','#a855f7','#ec4899'];
const colEl=document.getElementById('colors');
let penColor=COLORS[0];
COLORS.forEach(c=>{const b=document.createElement('div');b.className='cb'+(c===penColor?' act':'');
    b.style.background=c;b.onclick=()=>{document.querySelectorAll('.cb').forEach(x=>x.classList.remove('act'));b.classList.add('act');penColor=c};colEl.appendChild(b)});

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight-44;redraw()}
window.addEventListener('resize',resize);resize();

let vx=0,vy=0,vz=1;
function tw(sx,sy){return{x:(sx-vx)/vz,y:(sy-vy)/vz}}
function ts(wx,wy){return{x:wx*vz+vx,y:wy*vz+vy}}

let tool='draw',myId=null,drawing=false,panning=false,panSt=null,cur=null,all=[];
function ps(){return+document.getElementById('size').value}
function gid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36)}

function setTool(t){tool=t;
    document.getElementById('bDraw').classList.toggle('act',t==='draw');
    document.getElementById('bErase').classList.toggle('act',t==='erase');
    document.getElementById('bMove').classList.toggle('act',t==='move');
    cv.style.cursor=t==='draw'?'crosshair':t==='erase'?'cell':'grab'}

function drawGrid(){
    const gs=40*vz;if(gs<6)return;
    ctx.save();ctx.strokeStyle=dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.07)';ctx.lineWidth=1;
    const ox=vx%gs,oy=vy%gs;
    for(let x=ox;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
    for(let y=oy;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    ctx.restore()}

function drawS(s){
    if(!s.pts||s.pts.length<2)return;
    ctx.save();ctx.strokeStyle=s.color||'#e2e8f0';ctx.lineWidth=(s.size||3)*vz;
    ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();
    const p0=ts(s.pts[0].x,s.pts[0].y);ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<s.pts.length;i++){const p=ts(s.pts[i].x,s.pts[i].y);ctx.lineTo(p.x,p.y)}
    ctx.stroke();ctx.restore()}

function redraw(){
    ctx.clearRect(0,0,W,H);ctx.fillStyle=dark?'#1a1a2e':'#fff';ctx.fillRect(0,0,W,H);
    drawGrid();all.forEach(drawS);if(cur)drawS(cur)}

function resetView(){vx=0;vy=0;vz=1;redraw()}

// WS
const proto=location.protocol==='https:'?'wss:':'ws:',tok=localStorage.getItem('token');
let ws=null,rc=0;
function connect(){
    ws=new WebSocket(`${proto}//${location.host}/ws/board/${SID}?token=${tok}`);
    ws.onopen=()=>{document.getElementById('status').textContent='✓';rc=0;ws.send(JSON.stringify({type:'load'}))};
    ws.onclose=()=>{document.getElementById('status').textContent='⚠';setTimeout(()=>{rc++;if(rc<30)connect()},1000*Math.min(rc+1,5))};
    ws.onerror=()=>ws.close();
    ws.onmessage=e=>{const m=JSON.parse(e.data);
        if(m.type==='hello')myId=m.user_id;
        else if(m.type==='strokes'){all=m.data||[];redraw()}
        else if(m.type==='stroke'){all.push(m.data);drawS(m.data)}
        else if(m.type==='clear'){all=[];redraw()}
        else if(m.type==='erase_stroke'){all=all.filter(s=>s.id!==m.id);redraw()}}}
connect();

function eraseAt(sx,sy){
    const w=tw(sx,sy);const r=12/vz;
    for(let i=all.length-1;i>=0;i--){const s=all[i];
        if(s.pts&&s.pts.some(p=>Math.hypot(p.x-w.x,p.y-w.y)<r+(s.size||3)/2)){
            ws.send(JSON.stringify({type:'erase_stroke',id:s.id}));all.splice(i,1);redraw();return}}}

let spDown=false;
function gp(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}

function onDown(e){
    if(e.button===1||(e.button===0&&(spDown||tool==='move'))){
        panning=true;panSt=gp(e);cv.style.cursor='grabbing';e.preventDefault();return}
    if(e.button!==0)return;e.preventDefault();const p=gp(e);
    if(tool==='erase'){drawing=true;eraseAt(p.x,p.y);return}
    if(tool==='draw'){drawing=true;const wp=tw(p.x,p.y);
        cur={id:gid(),user_id:myId,color:penColor,size:ps(),pts:[wp]}}}

function onMove(e){
    e.preventDefault();const p=gp(e);
    if(panning&&panSt){vx+=p.x-panSt.x;vy+=p.y-panSt.y;panSt=p;redraw();return}
    if(!drawing)return;
    if(tool==='erase'){eraseAt(p.x,p.y);return}
    if(tool==='draw'&&cur){cur.pts.push(tw(p.x,p.y));redraw()}}

function onUp(){
    if(panning){panning=false;panSt=null;cv.style.cursor=tool==='move'?'grab':tool==='draw'?'crosshair':'cell';return}
    if(!drawing)return;drawing=false;
    if(tool==='draw'&&cur&&cur.pts.length>=2){all.push(cur);ws.send(JSON.stringify({type:'stroke',data:cur}))}
    cur=null;redraw()}

cv.addEventListener('mousedown',onDown);cv.addEventListener('mousemove',onMove);
cv.addEventListener('mouseup',onUp);cv.addEventListener('mouseleave',onUp);
cv.addEventListener('contextmenu',e=>e.preventDefault());

cv.addEventListener('touchstart',e=>{e.preventDefault();
    if(e.touches.length===1){const p=gp(e);
        if(tool==='erase'){drawing=true;eraseAt(p.x,p.y)}
        else if(tool==='draw'){drawing=true;const wp=tw(p.x,p.y);cur={id:gid(),user_id:myId,color:penColor,size:ps(),pts:[wp]}}
        else{panning=true;panSt=gp(e)}}},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();onMove(e)},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();onUp()});

cv.addEventListener('wheel',e=>{
    e.preventDefault();const p=gp(e);
    const d=e.deltaY>0?0.9:1.1;const nz=Math.max(0.05,Math.min(20,vz*d));
    vx=p.x-(p.x-vx)*nz/vz;vy=p.y-(p.y-vy)*nz/vz;vz=nz;redraw()},{passive:false});

document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.code==='Space'){e.preventDefault();spDown=true;if(!drawing)cv.style.cursor='grab'}
    const k=e.key.toLowerCase();
    if(k==='p'||k==='з')setTool('draw');
    if(k==='e'||k==='у')setTool('erase');
    if(k==='m'||k==='ь')setTool('move');
    if(e.ctrlKey&&(k==='z'||k==='я')){e.preventDefault();doUndo()}});
document.addEventListener('keyup',e=>{if(e.code==='Space'){spDown=false;cv.style.cursor=tool==='move'?'grab':tool==='draw'?'crosshair':'cell'}});

function doUndo(){ws.send(JSON.stringify({type:'undo'}))}
function doClear(){if(confirm('Очистить?'))ws.send(JSON.stringify({type:'clear'}))}

applyTheme();
</script></body></html>
