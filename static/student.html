<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HBM — Ученик</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top{background:#1e293b;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.top h1{font-size:1.1em}a{color:#60a5fa;text-decoration:none;font-size:.9em}a:hover{text-decoration:underline}
.wrap{max-width:900px;margin:0 auto;padding:24px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.85em;font-weight:600}
.btn-p{background:#3b82f6;color:#fff}.btn-p:hover{background:#2563eb}
.btn-s{background:#334155;color:#e2e8f0}.btn-s:hover{background:#475569}
.btn-d{background:#ef4444;color:#fff}.btn-d:hover{background:#dc2626}
.btn-sm{padding:4px 10px;font-size:.8em}
.meta{color:#94a3b8;font-size:.85em}
input,select{padding:8px 12px;border:1px solid #334155;border-radius:6px;background:#0f172a;color:#e2e8f0;font-size:.9em;outline:none}
input:focus,select:focus{border-color:#3b82f6}
.info{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.sec{background:#1e293b;border:1px solid #334155;border-radius:10px;margin-bottom:10px;overflow:hidden}
.sec-head{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sec-head:hover{background:#334155}
.sec-head h3{font-size:.95em;display:flex;align-items:center;gap:8px}
.sec-body{padding:0 16px 12px;display:none}
.sec.open .sec-body{display:block}.sec.open .arrow{transform:rotate(90deg)}
.arrow{transition:transform .2s;color:#64748b}
.badges span{font-size:.7em;padding:2px 6px;border-radius:3px;margin-left:4px}
.b-idz{background:#7c3aed33;color:#a78bfa}.b-ctrl{background:#3b82f633;color:#60a5fa}
.b-pass{background:#10b98133;color:#34d399}.b-fail{background:#ef444433;color:#f87171}
.item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;margin-bottom:4px;background:#0f172a}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.st-none{background:#64748b}.st-progress{background:#f59e0b}.st-done{background:#10b981}
.item-name{flex:1;font-size:.9em}.item-closed{opacity:.5;text-decoration:line-through}
.hw-bar{height:6px;background:#334155;border-radius:3px;flex:1;max-width:100px}
.hw-fill{height:100%;background:#10b981;border-radius:3px}
.modal-bg{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.show{display:flex}
.modal{background:#1e293b;border-radius:12px;padding:24px;width:460px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal h2{font-size:1.1em;margin-bottom:16px}
.modal label{display:block;color:#94a3b8;font-size:.85em;margin:8px 0 4px}
.modal input,.modal select{width:100%}
</style></head><body>
<div class="top"><h1 id="pn">📐 Ученик</h1><div class="row" style="margin:0"><a href="#" id="bL">Доска</a><a href="/hbm_tutor.html">← Панель</a></div></div>
<div class="wrap">
<div class="info" id="si"></div>
<div class="row">
<button class="btn btn-p" onclick="openM('mSec')">+ Раздел</button>
<button class="btn btn-s" onclick="openM('mApply')">📋 Курс</button>
<button class="btn btn-s" onclick="openM('mTpl')">📦 Шаблон</button>
</div>
<div id="secs"></div>
</div>
<div class="modal-bg" id="mSec"><div class="modal"><h2>Новый раздел</h2>
<label>Название</label><input id="secT">
<div class="row" style="margin-top:8px"><label><input type="checkbox" id="secI" checked> ИДЗ</label><label><input type="checkbox" id="secC" checked> Контр.</label></div>
<div class="row" style="margin-top:16px;justify-content:flex-end"><button class="btn btn-s" onclick="closeM('mSec')">Отмена</button><button class="btn btn-p" onclick="saveSec()">Создать</button></div></div></div>
<div class="modal-bg" id="mItem"><div class="modal"><h2>Добавить</h2>
<label>Тип</label><select id="iT" onchange="document.getElementById('hwF').style.display=this.value==='hw'?'':'none'"><option value="topic">Тема</option><option value="hw">ДЗ</option><option value="note">Заметка</option></select>
<label>Название</label><input id="iN">
<div id="hwF" style="display:none"><label>Всего заданий</label><input id="iTot" type="number" value="10"></div>
<div class="row" style="margin-top:16px;justify-content:flex-end"><button class="btn btn-s" onclick="closeM('mItem')">Отмена</button><button class="btn btn-p" onclick="saveItem()">Добавить</button></div></div></div>
<div class="modal-bg" id="mApply"><div class="modal"><h2>Применить курс</h2>
<p class="meta" style="margin-bottom:12px">⚠️ Заменит программу!</p>
<select id="aC"></select>
<div class="row" style="margin-top:16px;justify-content:flex-end"><button class="btn btn-s" onclick="closeM('mApply')">Отмена</button><button class="btn btn-p" onclick="doApply()">Применить</button></div></div></div>
<div class="modal-bg" id="mTpl"><div class="modal"><h2>Шаблон</h2>
<p class="meta" style="margin-bottom:12px">⚠️ Заменит программу!</p>
<div class="row"><button class="btn btn-s" onclick="doTpl('oge')">ОГЭ</button><button class="btn btn-s" onclick="doTpl('ege')">ЕГЭ</button><button class="btn btn-s" onclick="doTpl('olymp')">Олимпиады</button></div></div></div>
<script src="/api.js"></script>
<script>
if(!requireAuth(['owner','tutor']))throw'';
const SID=new URLSearchParams(location.search).get('id');
if(!SID){location.href='/hbm_tutor.html';throw''}
document.getElementById('bL').href='/board.html?id='+SID;
let S=null,cSec=null;
async function ld(){
    try{S=await get('/api/students/'+SID)}catch(e){alert('Не найден');location.href='/hbm_tutor.html';return}
    document.getElementById('pn').textContent='📐 '+S.name;
    const g={ege:'ЕГЭ',olymp:'Олимп',base:'База'};
    document.getElementById('si').innerHTML=`<div class="row" style="justify-content:space-between"><div><strong>${S.name}</strong> · ${S.grade}кл · ${g[S.goal]||S.goal} · ${S.format} · ${S.base_rate}₽</div><button class="btn btn-d btn-sm" onclick="delS()">Удалить</button></div>`;
    rSecs();ldC()}
function rSecs(){
    const el=document.getElementById('secs');
    if(!S.sections.length){el.innerHTML='<div style="text-align:center;color:#64748b;padding:40px">Пусто — примените курс или шаблон</div>';return}
    el.innerHTML=S.sections.map(s=>{
        const ct=s.control==='passed'?'<span class="b-pass">✓</span>':s.control==='failed'?'<span class="b-fail">✗</span>':'';
        return`<div class="sec" id="s_${s.id}"><div class="sec-head" onclick="tog('${s.id}')">
<h3><span class="arrow">▶</span>${s.title}<span class="badges">${s.idz_enabled?`<span class="b-idz">ИДЗ ${s.idz||0}</span>`:''}${s.control_enabled?`<span class="b-ctrl">К</span>`:''} ${ct}</span></h3>
<button class="btn btn-d btn-sm" onclick="event.stopPropagation();dSec('${s.id}')">✕</button></div>
<div class="sec-body">${s.items.map(rIt).join('')}
<div class="row" style="margin-top:8px"><button class="btn btn-s btn-sm" onclick="cSec='${s.id}';openM('mItem')">+ Элемент</button>
${s.idz_enabled?`<span class="meta">ИДЗ:</span><input type="number" value="${s.idz||0}" min="0" style="width:60px" onchange="uSec('${s.id}',{idz:+this.value})">`:''}
${s.control_enabled?`<select onchange="uSec('${s.id}',{control:this.value})" style="font-size:.8em"><option value="none"${s.control==='none'?' selected':''}>—</option><option value="passed"${s.control==='passed'?' selected':''}>Сдано</option><option value="failed"${s.control==='failed'?' selected':''}>Не сдано</option></select>`:''}
</div></div></div>`}).join('')}
function rIt(i){
    const cl=i.closed?'item-closed':'';
    if(i.type==='topic'){const sc={none:'st-none',progress:'st-progress',done:'st-done'};
        return`<div class="item ${cl}"><span class="status-dot ${sc[i.status]||'st-none'}"></span><span class="item-name">${i.name||''}</span>
<select onchange="uIt('${i.id}',{status:this.value})" style="font-size:.8em;padding:2px"><option value="none"${i.status==='none'?' selected':''}>—</option><option value="progress"${i.status==='progress'?' selected':''}>▶</option><option value="done"${i.status==='done'?' selected':''}>✓</option></select>
<button class="btn btn-d btn-sm" onclick="dIt('${i.id}')">✕</button></div>`}
    if(i.type==='hw'){const d=i.done||0,t=i.total||0,p=t?Math.round(d/t*100):0;
        return`<div class="item ${cl}"><span style="font-size:.8em">📋</span><span class="item-name">${i.name||'ДЗ'}</span>
<div class="hw-bar"><div class="hw-fill" style="width:${p}%"></div></div><span class="meta">${d}/${t}</span>
<input type="number" value="${d}" min="0" style="width:50px;padding:2px;font-size:.8em" onchange="uIt('${i.id}',{done:+this.value})"></div>`}
    return`<div class="item ${cl}"><span style="font-size:.8em">📝</span><span class="item-name">${i.name||i.text||''}</span><button class="btn btn-d btn-sm" onclick="dIt('${i.id}')">✕</button></div>`}
function tog(id){document.getElementById('s_'+id).classList.toggle('open')}
function openM(id){document.getElementById(id).classList.add('show')}
function closeM(id){document.getElementById(id).classList.remove('show')}
async function uSec(id,d){try{await patch('/api/sections/'+id,d);await ld()}catch(e){alert(e.detail||'Err')}}
async function uIt(id,d){try{await patch('/api/items/'+id,d);await ld()}catch(e){alert(e.detail||'Err')}}
async function saveSec(){const t=document.getElementById('secT').value;if(!t)return;
    try{await post(`/api/students/${SID}/sections`,{title:t,idz_enabled:document.getElementById('secI').checked,control_enabled:document.getElementById('secC').checked});closeM('mSec');document.getElementById('secT').value='';await ld()}catch(e){alert(e.detail||'Err')}}
async function saveItem(){const t=document.getElementById('iT').value,n=document.getElementById('iN').value,d={type:t,name:n};
    if(t==='hw'){d.total=+document.getElementById('iTot').value;d.done=0}
    try{await post(`/api/sections/${cSec}/items`,d);closeM('mItem');document.getElementById('iN').value='';await ld()}catch(e){alert(e.detail||'Err')}}
async function dSec(id){if(confirm('Удалить?')){await del('/api/sections/'+id);await ld()}}
async function dIt(id){try{await del('/api/items/'+id);await ld()}catch(e){alert(e.detail||'Err')}}
async function delS(){if(confirm('Удалить ученика?')){await del('/api/students/'+SID);location.href='/hbm_tutor.html'}}
async function ldC(){const cs=await get('/api/courses').catch(()=>[]);
    document.getElementById('aC').innerHTML=cs.length?cs.map(c=>`<option value="${c.id}">${c.title}</option>`).join(''):'<option>Нет курсов</option>'}
async function doApply(){const c=document.getElementById('aC').value;if(!c||!confirm('Заменить?'))return;
    try{await post(`/api/students/${SID}/apply-course/${c}`);closeM('mApply');await ld()}catch(e){alert(e.detail||'Err')}}
async function doTpl(k){if(!confirm('Заменить?'))return;try{await post(`/api/students/${SID}/apply-template/${k}`);closeM('mTpl');await ld()}catch(e){alert(e.detail||'Err')}}
ld();
</script></body></html>
