<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBM — Профиль ученика</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f1a0f;--surface:#1a2e1a;--surface2:#142214;--border:#2e4a2e;--accent:#00ff88;--text:#e8f5e8;--text-dim:#7aab7a;--danger:#ff4444;--warn:#ffaa00;--radius:12px;--font:'Segoe UI',system-ui,sans-serif}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:24px;max-width:900px;margin:0 auto}
    .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:.9rem;cursor:pointer;margin-bottom:24px;background:none;border:none;font-family:var(--font);transition:color .2s}.back-btn:hover{color:var(--accent)}
    .profile-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
    .profile-avatar{width:56px;height:56px;border-radius:50%;background:var(--accent);color:#0f1a0f;font-weight:700;font-size:1.3rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .profile-info h2{font-size:1.4rem;font-weight:700}.profile-info p{font-size:.85rem;color:var(--text-dim);margin-top:2px}
    .progress-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
    .progress-circle{position:relative;width:64px;height:64px;flex-shrink:0}.progress-circle svg{transform:rotate(-90deg)}.progress-circle .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;color:var(--accent)}
    .progress-stats{flex:1;min-width:160px}.progress-stats h3{font-size:.95rem;margin-bottom:6px}.stats-row{display:flex;gap:16px;flex-wrap:wrap}.stat-item{font-size:.82rem;color:var(--text-dim)}.stat-item strong{color:var(--text);font-size:.95rem}
    .rate-block{text-align:right;flex-shrink:0}.rate-block .rate-label{font-size:.75rem;color:var(--text-dim);margin-bottom:2px}.rate-block .rate-value{font-size:1.4rem;font-weight:700;color:var(--accent)}.rate-block .rate-base{font-size:.75rem;color:var(--text-dim)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:.88rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;font-family:var(--font)}.btn:active{transform:scale(.97)}.btn:hover{opacity:.85}
    .btn-primary{background:var(--accent);color:#0f1a0f}.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}.btn-warn{background:transparent;color:var(--warn);border:1px solid var(--warn)}.btn-sm{padding:5px 10px;font-size:.78rem}
    .roadmap-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}.roadmap-toolbar h3{font-size:1.1rem}
    .templates-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
    .template-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:.82rem;cursor:pointer;font-family:var(--font);transition:all .15s}.template-btn:hover{border-color:var(--accent);color:var(--accent)}
    .section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}.section-card.closed{border-color:var(--accent)}
    .section-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}.section-header:hover{background:var(--surface2)}
    .section-toggle{font-size:.7rem;color:var(--text-dim);transition:transform .2s}.section-toggle.open{transform:rotate(90deg)}
    .section-title{flex:1;font-weight:600;font-size:.98rem}
    .section-score{font-size:.82rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--border);color:var(--text-dim)}.section-score.good{background:#1a3a2a;color:var(--accent)}.section-score.mid{background:#2a2a1a;color:var(--warn)}.section-score.low{background:#2a1a1a;color:var(--danger)}.section-score.done{background:#0a2a1a;color:var(--accent)}
    .section-body{padding:0 16px 16px;display:none}.section-body.open{display:block}
    .timeline{margin-bottom:16px}.timeline-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start}.timeline-item:last-child{border-bottom:none}
    .timeline-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;margin-top:1px}.icon-topic{background:#1a3a2a;color:var(--accent)}.icon-hw{background:#2a2a1a;color:var(--warn)}.icon-note{background:#1a1a2a;color:#88aaff}
    .timeline-content{flex:1;min-width:0}.timeline-label{font-size:.72rem;color:var(--text-dim);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}.timeline-main{font-size:.9rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.timeline-meta{font-size:.75rem;color:var(--text-dim);margin-top:2px}
    .timeline-actions{opacity:0;transition:opacity .15s;display:flex;gap:3px;flex-shrink:0;align-items:flex-start;padding-top:1px}.timeline-item:hover .timeline-actions{opacity:1}
    .topic-status{display:inline-flex;align-items:center;gap:4px;cursor:pointer;background:none;border:1px solid var(--border);border-radius:99px;padding:2px 8px;font-size:.75rem;font-family:var(--font);color:var(--text-dim);transition:all .15s}.topic-status.progress{border-color:var(--warn);color:var(--warn)}.topic-status.done{border-color:var(--accent);color:var(--accent)}.topic-status:hover{border-color:var(--accent)}
    .hw-score{font-weight:700;color:var(--warn)}.hw-pct{color:var(--text-dim);font-size:.8rem}.hw-pending-badge{font-size:.72rem;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);white-space:nowrap}
    .close-form{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}.close-form input{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:.85rem;font-family:var(--font);outline:none;width:64px;text-align:center}.close-form input:focus{border-color:var(--accent)}
    .move-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;padding:0;font-family:var(--font);transition:all .15s;line-height:1}.move-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}.move-btn:disabled{opacity:.2;cursor:default}
    .attachment-list{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.attachment-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 7px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;font-size:.75rem;transition:border-color .15s;max-width:220px;text-decoration:none;color:var(--text)}.attachment-chip:hover{border-color:var(--accent)}.attachment-chip .att-icon{flex-shrink:0;font-size:.8rem}.attachment-chip .att-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}.attachment-chip .att-size{color:var(--text-dim);flex-shrink:0;font-size:.7rem}.attachment-chip .att-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:.95rem;line-height:1;padding:0 0 0 3px;flex-shrink:0;font-family:var(--font);display:flex;align-items:center}.attachment-chip .att-del:hover{color:var(--danger)}
    .constructor{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px}.constructor-title{font-size:.78rem;color:var(--text-dim);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}.constructor-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .add-form{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}.add-form input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:.85rem;font-family:var(--font);outline:none;flex:1;min-width:120px}.add-form input:focus{border-color:var(--accent)}.add-form input.narrow{flex:0 0 60px;min-width:0}
    .optional-section{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}.optional-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}.optional-title{font-size:.85rem;font-weight:600;flex:1}
    .optional-toggle{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-dim);cursor:pointer;background:none;border:1px solid var(--border);border-radius:99px;padding:3px 10px;font-family:var(--font);transition:all .15s}.optional-toggle.active{border-color:var(--accent);color:var(--accent)}.optional-toggle:hover{border-color:var(--accent)}.optional-body{padding:8px 0}
    .stars{display:flex;gap:4px}.star{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:.9rem;font-weight:700;color:var(--text-dim);font-family:var(--font);transition:all .15s;display:flex;align-items:center;justify-content:center}.star.active{background:var(--warn);border-color:var(--warn);color:#0f1a0f}.star:hover{border-color:var(--warn);color:var(--warn)}
    .control-status{font-size:.85rem;padding:4px 12px;border-radius:99px;font-weight:600}.control-status.passed{background:#1a3a2a;color:var(--accent)}.control-status.failed{background:#2a1a1a;color:var(--danger)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;backdrop-filter:blur(4px)}.modal-overlay.hidden{display:none}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:400px}.modal h2{font-size:1.1rem;margin-bottom:16px}
    .form-group{margin-bottom:14px}.form-group label{display:block;font-size:.82rem;color:var(--text-dim);margin-bottom:5px}.form-group input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.92rem;font-family:var(--font);outline:none}.form-group input:focus{border-color:var(--accent)}.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
  </style>
</head>
<body>

<input type="file" id="fileInput" style="display:none" accept=".pdf,.xml,.zip,.txt,.png,.gif,.jpg,.jpeg,.webp,.svg,.doc,.docx" />
<button class="back-btn" onclick="goBack()">← Все ученики</button>
<div class="profile-header">
  <div class="profile-avatar" id="profileAvatar"></div>
  <div class="profile-info"><h2 id="profileName">—</h2><p id="profileMeta">—</p></div>
</div>
<div class="progress-block">
  <div class="progress-circle"><svg width="64" height="64" viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" fill="none" stroke="#2e4a2e" stroke-width="6"/><circle cx="32" cy="32" r="26" fill="none" stroke="#00ff88" stroke-width="6" stroke-dasharray="163.4" stroke-dashoffset="163.4" stroke-linecap="round" id="progressArc"/></svg><div class="pct" id="progressPct">0%</div></div>
  <div class="progress-stats"><h3>Прогресс по программе</h3><div class="stats-row"><div class="stat-item">Закрыто: <strong id="statDone">0</strong></div><div class="stat-item">В работе: <strong id="statInProgress">0</strong></div><div class="stat-item">Не начато: <strong id="statLeft">0</strong></div></div></div>
  <div class="rate-block"><div class="rate-label">Текущий тариф</div><div class="rate-value" id="currentRate">—</div><div class="rate-base" id="baseRateLabel">—</div></div>
</div>
<div class="roadmap-toolbar"><h3>Программа</h3><div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="openBoard()">🖊 Доска</button><button class="btn btn-ghost btn-sm" id="btnAddSection" onclick="openAddSection()">+ Раздел</button></div></div>
<div class="templates-row" id="templatesRow">
  <span style="font-size:.82rem;color:var(--text-dim)">Шаблоны:</span>
  <button class="template-btn" onclick="applyTemplate('oge')">ОГЭ Математика</button>
  <button class="template-btn" onclick="applyTemplate('ege')">ЕГЭ Математика</button>
  <button class="template-btn" onclick="applyTemplate('olymp')">Олимпиады</button>
  <button class="template-btn" onclick="clearProgram()">Очистить</button>
</div>
<div id="roadmapContainer"></div>
<div class="modal-overlay hidden" id="addSectionModal"><div class="modal"><h2>Новый раздел</h2><div class="form-group"><label>Название раздела</label><input type="text" id="inputSectionName" placeholder="Геометрия" /></div><div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('addSectionModal')">Отмена</button><button class="btn btn-primary" onclick="addSection()">Добавить</button></div></div></div>

<script src="api.js"></script>
<script>
// Проверка авторизации
if (!requireAuth()) throw 'no auth';

const isTutor = getRole() === 'tutor';
const getStudentId = () => new URLSearchParams(location.search).get('id');

// Скрыть инструменты редактирования для не-репетиторов
if (!isTutor) {
  document.getElementById('btnAddSection').style.display = 'none';
  document.getElementById('templatesRow').style.display = 'none';
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fileIcon(m){if(!m)return'📎';if(m.startsWith('image/'))return'🖼';if(m==='application/pdf')return'📄';if(m.includes('zip'))return'🗜';if(m==='text/plain')return'📃';if(m.includes('xml'))return'📋';if(m.includes('word')||m.includes('doc'))return'📝';return'📎'}
function formatSize(b){if(b<1024)return b+' Б';if(b<1048576)return Math.round(b/1024)+' КБ';return(b/1048576).toFixed(1)+' МБ'}

let studentCache = null;
async function loadStudent(){
  try{studentCache=await apiGet('/students/'+getStudentId());return studentCache}
  catch(e){console.error(e);return null}
}

function calcBlockScore(sec){
  const hw=(sec.items||[]).filter(i=>i.type==='hw'&&i.closed!==false);let p=0,s=0;
  if(hw.length>0){s+=hw.reduce((a,h)=>a+(h.total>0?h.done/h.total:0),0)/hw.length;p++}
  if(sec.idz_enabled){s+=(sec.idz||0)/5;p++}
  if(sec.control_enabled){s+=(sec.control==='passed'?1:0);p++}
  const sc=p===0?0:s/p;const cl=sec.control_enabled&&sec.control==='passed';
  const any=hw.length>0||(sec.idz_enabled&&sec.idz>0)||(sec.control_enabled&&sec.control!=='none');
  return{score:sc,pct:Math.round(sc*100),closed:cl,inProgress:any&&!cl}
}
function calcOverall(secs){let t=0,c=0,ip=0,e=0;(secs||[]).forEach(s=>{const r=calcBlockScore(s);t+=r.score;if(r.closed)c++;else if(r.inProgress)ip++;else e++});const n=(secs||[]).length;return{pct:n===0?0:Math.round(t/n*100),closed:c,inProgress:ip,empty:e}}

let activeAddForm=null,activeCloseForm=null;

async function render(){
  const student=await loadStudent();
  if(!student){document.body.innerHTML='<p style="padding:40px;color:#ff4444">Ученик не найден. <a href="hbm_tutor.html" style="color:#00ff88">← Назад</a></p>';return}
  const initials=student.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('profileAvatar').textContent=initials;
  document.getElementById('profileName').textContent=student.name;
  const gl=student.grade==='student'?'Студент':student.grade+' класс';
  const gm={ege:'ЕГЭ/ОГЭ',olymp:'Олимпиады',base:'База'};
  document.getElementById('profileMeta').textContent=gl+' · '+(gm[student.goal]||student.goal)+' · '+(student.format==='online'?'Онлайн':'Очно');
  const secs=student.sections||[];
  const{pct,closed,inProgress,empty}=calcOverall(secs);
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('statDone').textContent=closed;
  document.getElementById('statInProgress').textContent=inProgress;
  document.getElementById('statLeft').textContent=empty;
  document.getElementById('progressArc').style.strokeDashoffset=163.4-163.4*pct/100;
  const disc=Math.floor(pct*0.3);const rate=Math.round(student.base_rate*(1-disc/100));
  document.getElementById('currentRate').textContent=rate.toLocaleString('ru')+' ₽/час';
  document.getElementById('baseRateLabel').textContent=disc>0?'Базовый: '+student.base_rate.toLocaleString('ru')+' ₽ (−'+disc+'%)':'Базовый тариф';
  const container=document.getElementById('roadmapContainer');
  const sf=captureActiveForms();
  if(secs.length===0){container.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-dim)"><div style="font-size:2rem;margin-bottom:12px">📚</div><p>Программа пуста. Выбери шаблон или добавь раздел.</p></div>';return}
  container.innerHTML=secs.map(s=>sectionHTML(s)).join('');
  secs.forEach(s=>{if(s.is_open)toggleSection(s.id,false)});
  restoreActiveForms(sf);
}

function sectionHTML(sec){
  const{pct,closed}=calcBlockScore(sec);let sc='section-score';
  if(closed)sc+=' done';else if(pct>=66)sc+=' good';else if(pct>=33)sc+=' mid';else if(pct>0)sc+=' low';
  const delBtn=isTutor?`<button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="event.stopPropagation();deleteSection('${sec.id}')">✕</button>`:'';
  return`<div class="section-card${closed?' closed':''}" id="sec-${sec.id}"><div class="section-header" onclick="toggleSection('${sec.id}')"><span class="section-toggle" id="toggle-${sec.id}">▶</span><span class="section-title">${esc(sec.title)}</span><span class="${sc}">${closed?'✓ ':''}${pct}%</span>${delBtn}</div><div class="section-body" id="body-${sec.id}">${timelineHTML(sec)}${isTutor?constructorHTML(sec):''}${optionalHTML(sec)}</div></div>`;
}

function attachmentsHTML(secId,itemId,atts,secClosed){
  if(!atts||atts.length===0)return'';
  return'<div class="attachment-list">'+atts.map(a=>{
    const url=a.file_path?'/'+a.file_path:'#';
    const del=(!secClosed&&isTutor)?`<button class="att-del" onclick="event.preventDefault();event.stopPropagation();deleteAttachment('${a.id}')" title="Удалить">×</button>`:'';
    return`<a class="attachment-chip" href="${url}" target="_blank" title="${esc(a.name)}"><span class="att-icon">${fileIcon(a.mime)}</span><span class="att-name">${esc(a.name)}</span><span class="att-size">${formatSize(a.size)}</span>${del}</a>`;
  }).join('')+'</div>';
}

function timelineHTML(sec){
  const items=sec.items||[];if(items.length===0)return'<div style="font-size:.82rem;color:var(--text-dim);padding:8px 0 4px">Лента пуста</div>';
  const secClosed=sec.control_enabled&&sec.control==='passed';
  return'<div class="timeline">'+items.map((item,idx)=>{
    const isF=idx===0,isL=idx===items.length-1;
    const mv=(!secClosed&&isTutor)?`<button class="move-btn" title="Выше" ${isF?'disabled':`onclick="moveItem('${sec.id}','${item.id}','up')"`}>↑</button><button class="move-btn" title="Ниже" ${isL?'disabled':`onclick="moveItem('${sec.id}','${item.id}','down')"`}>↓</button>`:'';
    const ab=(!secClosed&&isTutor)?`<button class="move-btn" title="Прикрепить файл" onclick="attachFile('${item.id}')">📎</button>`:'';
    const att=attachmentsHTML(sec.id,item.id,item.attachments,secClosed);
    if(item.type==='topic'){
      const click=(!secClosed&&isTutor)?`onclick="cycleTopicStatus('${item.id}','${item.status||'none'}')"`:' style="cursor:default"';
      const delB=(!secClosed&&isTutor)?`<button class="btn btn-danger btn-sm" onclick="deleteItem('${item.id}','topic')">✕</button>`:'';
      return`<div class="timeline-item"><div class="timeline-icon icon-topic">📖</div><div class="timeline-content"><div class="timeline-label">Тема</div><div class="timeline-main"><span>${esc(item.name)}</span><button class="topic-status ${item.status||'none'}" ${click}>${{none:'не начата',progress:'в работе',done:'пройдена'}[item.status||'none']}</button></div>${att}</div><div class="timeline-actions">${mv}${ab}${delB}</div></div>`;
    }
    if(item.type==='hw'){
      if(item.closed===false){
        const fo=activeCloseForm&&activeCloseForm.itemId===item.id;
        const closeBtn=(!fo&&!secClosed&&isTutor)?`<button class="btn btn-warn btn-sm" onclick="showCloseHwForm('${sec.id}','${item.id}')">Закрыть ДЗ</button>`:'';
        const cf=fo?`<div class="close-form"><span style="font-size:.82rem;color:var(--text-dim)">Выполнено:</span><input type="number" id="cf-done-${item.id}" placeholder="0" min="0" max="${item.total}" onkeydown="if(event.key==='Enter')saveCloseHw('${item.id}',${item.total})"/><span style="font-size:.82rem;color:var(--text-dim)">/ ${item.total}</span><button class="btn btn-primary btn-sm" onclick="saveCloseHw('${item.id}',${item.total})">ОК</button><button class="btn btn-ghost btn-sm" onclick="cancelCloseHwForm()">Отмена</button></div>`:'';
        return`<div class="timeline-item"><div class="timeline-icon icon-hw">📝</div><div class="timeline-content"><div class="timeline-label">ДЗ · выдано ${esc(item.date||'')}${item.note?' · '+esc(item.note):''}</div><div class="timeline-main"><span style="color:var(--text)">${item.total} задач</span><span class="hw-pending-badge">не сдано</span>${closeBtn}</div>${cf}${att}</div><div class="timeline-actions">${mv}${ab}</div></div>`;
      }else{
        const d=item.done,t=item.total,hp=t>0?Math.round(d/t*100):0;
        const dl=item.closed_date?`выдано ${esc(item.date||'')} · сдано ${esc(item.closed_date)}`:esc(item.date||'');
        return`<div class="timeline-item"><div class="timeline-icon icon-hw">📝</div><div class="timeline-content"><div class="timeline-label">ДЗ · ${dl}</div><div class="timeline-main"><span class="hw-score">${d}/${t}</span><span class="hw-pct">(${hp}%)</span></div>${item.note?`<div class="timeline-meta">${esc(item.note)}</div>`:''}${att}</div><div class="timeline-actions">${mv}${ab}</div></div>`;
      }
    }
    if(item.type==='note'){
      const delB=(!secClosed&&isTutor)?`<button class="btn btn-danger btn-sm" onclick="deleteItem('${item.id}','note')">✕</button>`:'';
      return`<div class="timeline-item"><div class="timeline-icon icon-note">💬</div><div class="timeline-content"><div class="timeline-label">Заметка · ${esc(item.date||'')}</div><div class="timeline-main">${esc(item.text||'')}</div>${att}</div><div class="timeline-actions">${mv}${ab}${delB}</div></div>`;
    }
    return'';
  }).join('')+'</div>';
}

function constructorHTML(sec){
  if(sec.control_enabled&&sec.control==='passed')return'';
  return`<div class="constructor"><div class="constructor-title">Добавить в ленту</div><div class="constructor-btns"><button class="btn btn-ghost btn-sm" onclick="showAddForm('${sec.id}','topic')">📖 Тема</button><button class="btn btn-ghost btn-sm" onclick="showAddForm('${sec.id}','hw')">📝 Выдать ДЗ</button><button class="btn btn-ghost btn-sm" onclick="showAddForm('${sec.id}','note')">💬 Заметка</button></div><div id="addform-${sec.id}" style="display:none"></div></div>`;
}

function optionalHTML(sec){
  const closed=sec.control_enabled&&sec.control==='passed';
  const idz=sec.idz||0,ctrl=sec.control||'none';
  const toggleIdz=isTutor?`<button class="optional-toggle${sec.idz_enabled?' active':''}" onclick="toggleOptional('${sec.id}','idz')">${sec.idz_enabled?'✓ включено':'+ включить'}</button>`:'';
  const toggleCtrl=isTutor?`<button class="optional-toggle${sec.control_enabled?' active':''}" onclick="toggleOptional('${sec.id}','control')">${sec.control_enabled?'✓ включена':'+ включить'}</button>`:'';

  let idzBody='<div style="font-size:.78rem;color:var(--text-dim);padding:4px 0">Скипнуто</div>';
  if(sec.idz_enabled){
    const stars=[1,2,3,4,5].map(n=>`<button class="star${idz>=n?' active':''}" onclick="${(closed||!isTutor)?'':`setIdz('${sec.id}',${n})`}" ${(closed||!isTutor)?'disabled':''} title="${n}">${n}</button>`).join('');
    const reset=(!closed&&isTutor&&idz>0)?`<button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="setIdz('${sec.id}',0)">Сбросить</button>`:'';
    const label=idz===0?'<div style="font-size:.78rem;color:var(--text-dim);margin-top:6px">Не оценено</div>':`<div style="font-size:.78rem;color:var(--text-dim);margin-top:6px">${idz}/5 · ${Math.round(idz/5*100)}%</div>`;
    idzBody=`<div class="optional-body"><div class="stars">${stars}</div>${reset}${label}</div>`;
  }

  let ctrlBody='<div style="font-size:.78rem;color:var(--text-dim);padding:4px 0">Скипнуто</div>';
  if(sec.control_enabled){
    if(ctrl==='none'&&isTutor)ctrlBody=`<div class="optional-body"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><button class="btn btn-primary btn-sm" onclick="setControl('${sec.id}','passed')">✓ Зачёт</button><button class="btn btn-warn btn-sm" onclick="setControl('${sec.id}','failed')">✗ Незачёт</button><span style="font-size:.78rem;color:var(--text-dim)">Зачёт закроет блок</span></div></div>`;
    else if(ctrl==='none')ctrlBody='<div class="optional-body"><div style="font-size:.78rem;color:var(--text-dim)">Ожидает оценки</div></div>';
    else if(ctrl==='passed')ctrlBody='<div class="optional-body"><span class="control-status passed">✓ Зачёт — блок закрыт</span></div>';
    else ctrlBody=`<div class="optional-body"><div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><span class="control-status failed">✗ Незачёт</span>${isTutor?`<button class="btn btn-primary btn-sm" onclick="setControl('${sec.id}','passed')">Пересдал → Зачёт</button><button class="btn btn-ghost btn-sm" onclick="setControl('${sec.id}','none')">Сбросить</button>`:''}</div></div>`;
  }

  return`<div class="optional-section"><div style="margin-bottom:12px"><div class="optional-header"><span class="optional-title">📋 Итоговое домашнее задание</span>${toggleIdz}</div>${idzBody}</div><div><div class="optional-header"><span class="optional-title">🎯 Контрольная работа</span>${toggleCtrl}</div>${ctrlBody}</div></div>`;
}

// ── Формы ──
function captureActiveForms(){const s={};if(activeAddForm){const{secId,type}=activeAddForm;const v={};if(type==='topic')v.name=document.getElementById('af-name-'+secId)?.value||'';else if(type==='hw'){v.total=document.getElementById('af-total-'+secId)?.value||'';v.note=document.getElementById('af-note-'+secId)?.value||''}else if(type==='note')v.text=document.getElementById('af-text-'+secId)?.value||'';s.addForm={secId,type,vals:v}}if(activeCloseForm){s.closeForm={...activeCloseForm,doneVal:document.getElementById('cf-done-'+activeCloseForm.itemId)?.value||''}}return s}
function restoreActiveForms(s){if(!s)return;if(s.addForm){const{secId,type,vals}=s.addForm;if(!document.getElementById('addform-'+secId)){activeAddForm=null}else{const b=document.getElementById('body-'+secId);if(b&&!b.classList.contains('open'))toggleSection(secId,false);showAddForm(secId,type,true);if(type==='topic'){const e=document.getElementById('af-name-'+secId);if(e)e.value=vals.name}else if(type==='hw'){const t=document.getElementById('af-total-'+secId);if(t)t.value=vals.total;const n=document.getElementById('af-note-'+secId);if(n)n.value=vals.note}else if(type==='note'){const e=document.getElementById('af-text-'+secId);if(e)e.value=vals.text}}}if(s.closeForm){const e=document.getElementById('cf-done-'+s.closeForm.itemId);if(e){e.value=s.closeForm.doneVal;e.focus()}else activeCloseForm=null}}

function showAddForm(secId,type,noFocus=false){
  activeAddForm={secId,type};const el=document.getElementById('addform-'+secId);
  if(type==='topic')el.innerHTML=`<div class="add-form"><input type="text" id="af-name-${secId}" placeholder="Название темы" onkeydown="if(event.key==='Enter')addItem('${secId}','topic')"/><button class="btn btn-primary btn-sm" onclick="addItem('${secId}','topic')">Добавить</button><button class="btn btn-ghost btn-sm" onclick="hideAddForm('${secId}')">Отмена</button></div>`;
  else if(type==='hw')el.innerHTML=`<div class="add-form"><span style="font-size:.82rem;color:var(--text-dim);white-space:nowrap">Задач:</span><input type="number" class="narrow" id="af-total-${secId}" placeholder="15" min="1" onkeydown="if(event.key==='Enter')addItem('${secId}','hw')"/><input type="text" id="af-note-${secId}" placeholder="Описание" onkeydown="if(event.key==='Enter')addItem('${secId}','hw')"/><button class="btn btn-primary btn-sm" onclick="addItem('${secId}','hw')">Выдать</button><button class="btn btn-ghost btn-sm" onclick="hideAddForm('${secId}')">Отмена</button></div>`;
  else if(type==='note')el.innerHTML=`<div class="add-form"><input type="text" id="af-text-${secId}" placeholder="Текст заметки" onkeydown="if(event.key==='Enter')addItem('${secId}','note')"/><button class="btn btn-primary btn-sm" onclick="addItem('${secId}','note')">Добавить</button><button class="btn btn-ghost btn-sm" onclick="hideAddForm('${secId}')">Отмена</button></div>`;
  el.style.display='block';if(!noFocus){const i=el.querySelector('input');if(i)setTimeout(()=>i.focus(),50)}
}
function hideAddForm(secId){activeAddForm=null;const el=document.getElementById('addform-'+secId);if(el){el.innerHTML='';el.style.display='none'}}

// ── Действия ──
function toggleSection(id,save=true){const b=document.getElementById('body-'+id),t=document.getElementById('toggle-'+id);const o=b.classList.toggle('open');t.classList.toggle('open',o);if(save){apiPatch('/sections/'+id,{is_open:o});const s=studentCache?.sections?.find(x=>x.id===id);if(s)s.is_open=o}}
async function cycleTopicStatus(itemId,cur){await apiPatch('/items/'+itemId,{status:{none:'progress',progress:'done',done:'none'}[cur||'none']});render()}
async function addItem(secId,type){
  const date=new Date().toLocaleDateString('ru',{day:'2-digit',month:'2-digit'});let body;
  if(type==='topic'){const n=(document.getElementById('af-name-'+secId)||{}).value?.trim();if(!n)return;body={type:'topic',name:n,status:'none'}}
  else if(type==='hw'){const t=parseInt((document.getElementById('af-total-'+secId)||{}).value);const n=(document.getElementById('af-note-'+secId)||{}).value?.trim();if(isNaN(t)||t<=0){alert('Укажи количество задач');return}body={type:'hw',total:t,closed:false,date,note:n||''}}
  else if(type==='note'){const t=(document.getElementById('af-text-'+secId)||{}).value?.trim();if(!t)return;body={type:'note',text:t,date}}
  if(!body)return;await apiPost('/sections/'+secId+'/items',body);activeAddForm=null;render()
}
async function moveItem(secId,itemId,dir){const sec=studentCache?.sections?.find(x=>x.id===secId);if(!sec?.items)return;const ids=sec.items.map(i=>i.id);const idx=ids.indexOf(itemId);const ni=dir==='up'?idx-1:idx+1;if(ni<0||ni>=ids.length)return;[ids[idx],ids[ni]]=[ids[ni],ids[idx]];await apiFetch('/sections/'+secId+'/items/reorder',{method:'POST',body:JSON.stringify(ids)});render()}
function showCloseHwForm(secId,itemId){activeCloseForm={secId,itemId};render();setTimeout(()=>{const e=document.getElementById('cf-done-'+itemId);if(e)e.focus()},100)}
function cancelCloseHwForm(){activeCloseForm=null;render()}
async function saveCloseHw(itemId,total){const d=parseInt(document.getElementById('cf-done-'+itemId)?.value);if(isNaN(d)||d<0||d>total){alert(`Выполнено: 0–${total}`);return}await apiPatch('/items/'+itemId,{done:d,closed:true,closed_date:new Date().toLocaleDateString('ru',{day:'2-digit',month:'2-digit'})});activeCloseForm=null;render()}
function attachFile(itemId){const inp=document.getElementById('fileInput');inp.value='';inp.onchange=async e=>{const f=e.target.files[0];if(!f)return;if(f.size>52428800){alert('Максимум 50 МБ');return}await apiUpload('/items/'+itemId+'/attachments',f);render()};inp.click()}
async function deleteAttachment(id){if(!confirm('Удалить вложение?'))return;await apiDelete('/attachments/'+id);render()}
async function deleteItem(id,type){if(type==='hw'){alert('ДЗ нельзя удалить');return}await apiDelete('/items/'+id);render()}
async function deleteSection(id){if(!confirm('Удалить раздел?'))return;await apiDelete('/sections/'+id);render()}
async function toggleOptional(secId,w){const sec=studentCache?.sections?.find(x=>x.id===secId);if(!sec)return;const d={};if(w==='idz')d.idz_enabled=!sec.idz_enabled;if(w==='control')d.control_enabled=!sec.control_enabled;await apiPatch('/sections/'+secId,d);render()}
async function setIdz(secId,v){await apiPatch('/sections/'+secId,{idz:v});render()}
async function setControl(secId,v){if(v==='passed'&&!confirm('Зафиксировать зачёт? Блок будет закрыт.'))return;await apiPatch('/sections/'+secId,{control:v});render()}
async function addSection(){const n=document.getElementById('inputSectionName').value.trim();if(!n)return;await apiPost('/students/'+getStudentId()+'/sections',{title:n});closeModal('addSectionModal');render()}
async function applyTemplate(k){if(!confirm('Загрузить шаблон? Программа будет заменена.'))return;await apiFetch('/students/'+getStudentId()+'/apply-template/'+k,{method:'POST'});render()}
async function clearProgram(){if(!confirm('Очистить всю программу?'))return;for(const sec of studentCache?.sections||[])await apiDelete('/sections/'+sec.id);render()}
function goBack(){location.href='hbm_tutor.html'}
function openBoard(){location.href='board.html?id='+getStudentId()}
function openAddSection(){document.getElementById('addSectionModal').classList.remove('hidden');setTimeout(()=>document.getElementById('inputSectionName').focus(),50)}
function closeModal(id){document.getElementById(id).classList.add('hidden');if(id==='addSectionModal')document.getElementById('inputSectionName').value=''}
document.getElementById('addSectionModal').addEventListener('click',function(e){if(e.target===this)closeModal('addSectionModal')});
document.getElementById('inputSectionName').addEventListener('keydown',e=>{if(e.key==='Enter')addSection()});
render();
</script>
</body>
