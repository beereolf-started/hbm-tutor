<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBM — Вход</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f1a0f;--surface:#1a2e1a;--border:#2e4a2e;
      --accent:#00ff88;--text:#e8f5e8;--text-dim:#7aab7a;
      --danger:#ff4444;--radius:12px;
      --font:'Segoe UI',system-ui,sans-serif;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:100%;max-width:380px}
    .login-card h1{font-size:1.4rem;margin-bottom:4px;text-align:center}
    .login-card h1 span{color:var(--accent)}
    .login-card .subtitle{text-align:center;font-size:.85rem;color:var(--text-dim);margin-bottom:28px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:.85rem;color:var(--text-dim);margin-bottom:6px}
    .form-group input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.95rem;font-family:var(--font);outline:none;transition:border-color .2s}
    .form-group input:focus{border-color:var(--accent)}
    .btn{display:block;width:100%;padding:12px;border-radius:8px;border:none;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:var(--font)}
    .btn-primary{background:var(--accent);color:#0f1a0f}
    .btn:hover{opacity:.85}
    .error-msg{color:var(--danger);font-size:.85rem;text-align:center;margin-bottom:12px;min-height:1.2em}

    /* Форма смены пароля */
    .change-pw{display:none}
    .change-pw.active{display:block}
    .login-form.hidden{display:none}
  </style>
</head>
<body>
  <div class="login-card">
    <h1>HBM <span>Репетитор</span></h1>
    <p class="subtitle">Вход в систему</p>

    <!-- Форма логина -->
    <div class="login-form" id="loginForm">
      <div class="error-msg" id="loginError"></div>
      <div class="form-group">
        <label>Логин</label>
        <input type="text" id="inputLogin" placeholder="admin" autofocus />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="inputPassword" placeholder="••••••" />
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Войти</button>
    </div>

    <!-- Форма смены пароля (при первом входе) -->
    <div class="change-pw" id="changePwForm">
      <div class="error-msg" id="changePwError"></div>
      <p style="font-size:.88rem;color:var(--text-dim);margin-bottom:16px;text-align:center">
        Необходимо сменить пароль
      </p>
      <div class="form-group">
        <label>Новый пароль (мин. 6 символов)</label>
        <input type="password" id="inputNewPassword" placeholder="••••••" />
      </div>
      <div class="form-group">
        <label>Повторите пароль</label>
        <input type="password" id="inputNewPassword2" placeholder="••••••" />
      </div>
      <button class="btn btn-primary" onclick="doChangePassword()">Сменить и продолжить</button>
    </div>
  </div>

  <script>
    const API = '/api';
    let tempToken = null;
    let tempOldPassword = null;

    // Если уже залогинен — сразу редирект
    const saved = localStorage.getItem('hbm_token');
    if (saved) {
      redirect(localStorage.getItem('hbm_role'));
    }

    function redirect(role) {
      if (role === 'tutor')   location.href = '/hbm_tutor.html';
      else if (role === 'student') location.href = '/student_lk.html';
      else if (role === 'parent')  location.href = '/parent_lk.html';
      else location.href = '/hbm_tutor.html';
    }

    async function doLogin() {
      const login    = document.getElementById('inputLogin').value.trim();
      const password = document.getElementById('inputPassword').value;
      document.getElementById('loginError').textContent = '';

      if (!login || !password) {
        document.getElementById('loginError').textContent = 'Введите логин и пароль';
        return;
      }

      try {
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          document.getElementById('loginError').textContent = err.detail || 'Ошибка входа';
          return;
        }

        const data = await res.json();

        if (data.must_change_password) {
          // Показать форму смены пароля
          tempToken = data.token;
          tempOldPassword = password;
          document.getElementById('loginForm').classList.add('hidden');
          document.getElementById('changePwForm').classList.add('active');
          document.getElementById('inputNewPassword').focus();
          return;
        }

        // Сохранить и перейти
        localStorage.setItem('hbm_token', data.token);
        localStorage.setItem('hbm_role', data.role);
        localStorage.setItem('hbm_name', data.name);
        redirect(data.role);

      } catch (e) {
        document.getElementById('loginError').textContent = 'Сервер недоступен';
      }
    }

    async function doChangePassword() {
      const pw1 = document.getElementById('inputNewPassword').value;
      const pw2 = document.getElementById('inputNewPassword2').value;
      document.getElementById('changePwError').textContent = '';

      if (pw1.length < 6) {
        document.getElementById('changePwError').textContent = 'Минимум 6 символов';
        return;
      }
      if (pw1 !== pw2) {
        document.getElementById('changePwError').textContent = 'Пароли не совпадают';
        return;
      }

      try {
        const res = await fetch(API + '/auth/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + tempToken,
          },
          body: JSON.stringify({ old_password: tempOldPassword, new_password: pw1 }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          document.getElementById('changePwError').textContent = err.detail || 'Ошибка';
          return;
        }

        // Перелогиниться с новым паролем
        const loginRes = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login: document.getElementById('inputLogin').value.trim(), password: pw1 }),
        });
        const data = await loginRes.json();

        localStorage.setItem('hbm_token', data.token);
        localStorage.setItem('hbm_role', data.role);
        localStorage.setItem('hbm_name', data.name);
        redirect(data.role);

      } catch (e) {
        document.getElementById('changePwError').textContent = 'Сервер недоступен';
      }
    }

    // Enter для отправки
    document.getElementById('inputPassword').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('inputLogin').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('inputNewPassword2').addEventListener('keydown', e => {
      if (e.key === 'Enter') doChangePassword();
    });
  </script>
</body>
</html>
