<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HBM — Вход</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border-radius:16px;padding:40px;width:360px;box-shadow:0 8px 32px #0004}
h1{text-align:center;margin-bottom:8px;font-size:1.6em}
.sub{text-align:center;color:#94a3b8;margin-bottom:24px;font-size:.9em}
input{width:100%;padding:12px 16px;border:1px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:1em;margin-bottom:12px;outline:none}
input:focus{border-color:#3b82f6}
button{width:100%;padding:12px;border:none;border-radius:8px;background:#3b82f6;color:#fff;font-size:1em;cursor:pointer;font-weight:600}
button:hover{background:#2563eb}
.err{color:#f87171;text-align:center;margin-top:12px;font-size:.9em;display:none}
.chpw{display:none}.chpw h2{font-size:1.2em;margin-bottom:16px}
</style></head><body>
<div class="card">
<div id="loginForm">
<h1>📐 HBM</h1><p class="sub">Платформа репетитора</p>
<input id="login" placeholder="Логин" autocomplete="username">
<input id="pw" type="password" placeholder="Пароль" autocomplete="current-password">
<button onclick="doLogin()">Войти</button>
<p class="err" id="err"></p>
</div>
<div id="chpw" class="chpw">
<h2>Смена пароля</h2><p class="sub">Установите новый пароль</p>
<input id="oldPw" type="password" placeholder="Текущий пароль">
<input id="newPw" type="password" placeholder="Новый пароль (мин. 6)">
<button onclick="doChange()">Сменить</button>
<p class="err" id="err2"></p>
</div>
</div>
<script src="/api.js"></script>
<script>
const ROUTES={owner:'/hbm_tutor.html',tutor:'/hbm_tutor.html',student:'/student_lk.html',parent:'/parent_lk.html'};
if(localStorage.getItem('token')){const r=role();if(r&&ROUTES[r])location.href=ROUTES[r]}
async function doLogin(){
    const e=document.getElementById('err');e.style.display='none';
    try{
        const d=await post('/api/auth/login',{login:document.getElementById('login').value,password:document.getElementById('pw').value});
        localStorage.setItem('token',d.token);localStorage.setItem('role',d.role);localStorage.setItem('name',d.name);
        if(d.must_change_password){document.getElementById('loginForm').style.display='none';document.getElementById('chpw').style.display='block';document.getElementById('oldPw').value=document.getElementById('pw').value;return}
        location.href=ROUTES[d.role]||'/hbm_tutor.html';
    }catch(x){e.textContent=x.detail||'Ошибка';e.style.display='block'}}
async function doChange(){
    const e=document.getElementById('err2');e.style.display='none';
    try{
        await post('/api/auth/change-password',{old_password:document.getElementById('oldPw').value,new_password:document.getElementById('newPw').value});
        location.href=ROUTES[role()]||'/hbm_tutor.html';
    }catch(x){e.textContent=x.detail||'Ошибка';e.style.display='block'}}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script></body></html>
