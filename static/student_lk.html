<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HBM — Мой кабинет</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top{background:#1e293b;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.top h1{font-size:1.1em}a{color:#60a5fa;text-decoration:none;font-size:.9em}
button.link{color:#60a5fa;background:none;border:none;cursor:pointer;font-size:.9em}
.wrap{max-width:800px;margin:0 auto;padding:24px}
.meta{color:#94a3b8;font-size:.85em;margin-bottom:16px}
.sec{background:#1e293b;border:1px solid #334155;border-radius:10px;margin-bottom:10px;overflow:hidden}
.sec-h{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sec-h:hover{background:#334155}.sec-h h3{font-size:.95em}
.sec-body{padding:0 16px 16px;display:none}.sec.open .sec-body{display:block}
.item{padding:6px 10px;background:#0f172a;border-radius:6px;margin-bottom:4px;display:flex;align-items:center;gap:8px;font-size:.9em}
.status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.st-none{background:#64748b}.st-progress{background:#f59e0b}.st-done{background:#10b981}
.hw-bar{height:4px;background:#334155;border-radius:2px;flex:1;max-width:80px}
.hw-fill{height:100%;background:#3b82f6;border-radius:2px}
.goal{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:600}
.goal-ege{background:#7c3aed33;color:#a78bfa}.goal-olymp{background:#f59e0b33;color:#fbbf24}.goal-base{background:#10b98133;color:#34d399}
</style></head><body>
<div class="top"><h1>📐 Мой кабинет</h1><div style="display:flex;gap:12px;align-items:center"><span id="uname" class="meta"></span><button class="link" onclick="logout()">Выйти</button></div></div>
<div class="wrap">
<div id="info" class="meta"></div>
<div id="sections"></div>
</div>
<script src="/api.js"></script>
<script>
if(!requireAuth(['student']))throw'';
document.getElementById('uname').textContent=localStorage.getItem('name');
let student=null;

async function load(){
    const list=await get('/api/students');
    if(!list.length){document.getElementById('sections').innerHTML='<p class="meta">Профиль не привязан</p>';return}
    student=await get('/api/students/'+list[0].id);render()}

function render(){
    const s=student,gl=s.goal==='ege'?'ЕГЭ':s.goal==='olymp'?'Олимп':'База';
    document.getElementById('info').innerHTML=`${s.name} · ${s.grade} класс · <span class="goal goal-${s.goal}">${gl}</span> · <a href="/board.html?id=${s.id}">🎨 Доска</a>`;
    const el=document.getElementById('sections');
    if(!s.sections.length){el.innerHTML='<p class="meta" style="text-align:center;padding:40px">Программа пока не назначена</p>';return}
    el.innerHTML=s.sections.map(sec=>`<div class="sec${sec.is_open?' open':''}" onclick="toggle('${sec.id}',this)">
<div class="sec-h"><h3>${sec.is_open?'▼':'▶'} ${sec.title}</h3>
<span class="meta">${sec.idz_enabled?'ИДЗ:'+sec.idz+'/10 ':' '}${sec.control_enabled?(sec.control==='passed'?'✅':sec.control==='failed'?'❌':'—'):''}</span></div>
<div class="sec-body">${sec.items.map(i=>{
    let extra='';
    if(i.type==='hw'&&i.total){const p=i.done?Math.round(i.done/i.total*100):0;extra=`<div class="hw-bar"><div class="hw-fill" style="width:${p}%"></div></div><span class="meta">${i.done||0}/${i.total}</span>`}
    return`<div class="item"><div class="status st-${i.status||'none'}"></div><span style="flex:1">${i.name||i.type}</span>${extra}</div>`}).join('')}
</div></div>`).join('')}

async function toggle(id,el){
    const sec=student.sections.find(s=>s.id===id);if(!sec)return;
    try{await patch('/api/sections/'+id,{is_open:!sec.is_open});sec.is_open=!sec.is_open;render()}catch(e){}}
load();
</script></body></html>
