<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HBM — Родитель</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top{background:#1e293b;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.top h1{font-size:1.1em}
button.link{color:#60a5fa;background:none;border:none;cursor:pointer;font-size:.9em}
.wrap{max-width:800px;margin:0 auto;padding:24px}
.meta{color:#94a3b8;font-size:.85em}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin-bottom:16px}
.card h2{font-size:1.1em;margin-bottom:8px}
a{color:#60a5fa;text-decoration:none;font-size:.9em}
.sec{background:#0f172a;border-radius:8px;padding:10px 12px;margin-bottom:6px}
.sec h4{font-size:.9em;margin-bottom:6px;color:#cbd5e1}
.item{display:flex;align-items:center;gap:8px;font-size:.85em;padding:2px 0}
.status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.st-none{background:#64748b}.st-progress{background:#f59e0b}.st-done{background:#10b981}
.goal{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:600}
.goal-ege{background:#7c3aed33;color:#a78bfa}.goal-olymp{background:#f59e0b33;color:#fbbf24}.goal-base{background:#10b98133;color:#34d399}
</style></head><body>
<div class="top"><h1>👨‍👩‍👧 Кабинет родителя</h1><div style="display:flex;gap:12px;align-items:center"><span id="uname" class="meta"></span><button class="link" onclick="logout()">Выйти</button></div></div>
<div class="wrap"><div id="children"></div></div>
<script src="/api.js"></script>
<script>
if(!requireAuth(['parent']))throw'';
document.getElementById('uname').textContent=localStorage.getItem('name');

async function load(){
    const list=await get('/api/students');
    if(!list.length){document.getElementById('children').innerHTML='<p class="meta" style="text-align:center;padding:40px">Нет привязанных детей</p>';return}
    let h='';
    for(const s of list){
        const full=await get('/api/students/'+s.id);
        const gl=full.goal==='ege'?'ЕГЭ':full.goal==='olymp'?'Олимп':'База';
        h+=`<div class="card"><h2>${full.name}</h2>
<div class="meta" style="margin-bottom:12px">${full.grade} класс · <span class="goal goal-${full.goal}">${gl}</span> · <a href="/board.html?id=${full.id}">🎨 Доска</a></div>`;
        if(full.sections.length){
            for(const sec of full.sections){
                h+=`<div class="sec"><h4>${sec.title}</h4>`;
                for(const i of sec.items){
                    h+=`<div class="item"><div class="status st-${i.status||'none'}"></div>${i.name||i.type}</div>`}
                h+='</div>'}
        }else{h+='<p class="meta">Программа не назначена</p>'}
        h+='</div>'}
    document.getElementById('children').innerHTML=h}
load();
</script></body></html>
