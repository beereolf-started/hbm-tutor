<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HBM — Панель</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.top{background:#1e293b;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #334155}
.top h1{font-size:1.1em}.top-r{display:flex;gap:12px;align-items:center}.top-r span{color:#94a3b8;font-size:.85em}
.badge{background:#3b82f6;color:#fff;padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:600}
a,button.link{color:#60a5fa;text-decoration:none;background:none;border:none;cursor:pointer;font-size:.9em}
a:hover,button.link:hover{text-decoration:underline}
.wrap{max-width:900px;margin:0 auto;padding:24px}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;background:#1e293b;border:1px solid #334155;cursor:pointer;font-size:.9em;color:#94a3b8}
.tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:12px;border:1px solid #334155}
.card:hover{border-color:#475569}
.card h3{font-size:1em;margin-bottom:4px}.card .meta{color:#94a3b8;font-size:.8em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.85em;font-weight:600}
.btn-p{background:#3b82f6;color:#fff}.btn-p:hover{background:#2563eb}
.btn-s{background:#334155;color:#e2e8f0}.btn-s:hover{background:#475569}
.btn-d{background:#ef4444;color:#fff}.btn-d:hover{background:#dc2626}
.btn-sm{padding:4px 10px;font-size:.8em}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
input,select{padding:8px 12px;border:1px solid #334155;border-radius:6px;background:#0f172a;color:#e2e8f0;font-size:.9em}
input:focus,select:focus{border-color:#3b82f6;outline:none}
.modal-bg{position:fixed;inset:0;background:#000a;display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.show{display:flex}
.modal{background:#1e293b;border-radius:12px;padding:24px;width:420px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal h2{font-size:1.1em;margin-bottom:16px}
.modal label{display:block;color:#94a3b8;font-size:.85em;margin:8px 0 4px}
.modal input,.modal select{width:100%;margin-bottom:4px}
.empty{text-align:center;color:#64748b;padding:40px}
.goal{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:600}
.goal-ege{background:#7c3aed33;color:#a78bfa}.goal-olymp{background:#f59e0b33;color:#fbbf24}.goal-base{background:#10b98133;color:#34d399}
</style></head><body>
<div class="top">
<h1>📐 HBM</h1>
<div class="top-r">
<span id="userName"></span><span class="badge" id="userRole"></span>
<a href="/courses.html">Курсы</a>
<button class="link" onclick="logout()">Выйти</button>
</div></div>
<div class="wrap">
<div class="tabs" id="tabs"></div>
<div id="content"></div>
</div>

<!-- Modal: Add Student -->
<div class="modal-bg" id="mStudent"><div class="modal">
<h2>Новый ученик</h2>
<label>Имя</label><input id="sName">
<label>Класс</label><input id="sGrade" value="9">
<div class="row" style="margin-top:8px">
<div><label>Цель</label><select id="sGoal"><option value="ege">ЕГЭ</option><option value="olymp">Олимпиады</option><option value="base">База</option></select></div>
<div><label>Ставка ₽</label><input id="sRate" type="number" value="1500" style="width:100px"></div>
<div><label>Формат</label><select id="sFormat"><option value="online">Онлайн</option><option value="offline">Офлайн</option></select></div>
</div>
<label>Предмет</label><select id="sSubject"></select>
<div class="row" style="margin-top:16px;justify-content:flex-end">
<button class="btn btn-s" onclick="closeM('mStudent')">Отмена</button>
<button class="btn btn-p" onclick="saveStudent()">Создать</button>
</div></div></div>

<!-- Modal: Add User -->
<div class="modal-bg" id="mUser"><div class="modal">
<h2>Новый пользователь</h2>
<label>Роль</label><select id="uRole" onchange="onRoleChange()"><option value="tutor">Преподаватель</option><option value="student">Ученик</option><option value="parent">Родитель</option></select>
<label>Имя</label><input id="uName">
<label>Логин</label><input id="uLogin">
<label>Пароль</label><input id="uPw" value="">
<div id="uTutorFields"><label>Предмет</label><select id="uSubject"></select></div>
<div id="uStudentFields" style="display:none"><label>Профиль ученика</label><select id="uStudent"></select></div>
<div id="uParentFields" style="display:none"><label>Дети (ID через запятую)</label><input id="uChildren"></div>
<div class="row" style="margin-top:16px;justify-content:flex-end">
<button class="btn btn-s" onclick="closeM('mUser')">Отмена</button>
<button class="btn btn-p" onclick="saveUser()">Создать</button>
</div></div></div>

<script src="/api.js"></script>
<script>
if(!requireAuth(['owner','tutor']))throw'';
const R=role(),isOwner=R==='owner';
document.getElementById('userName').textContent=localStorage.getItem('name');
document.getElementById('userRole').textContent=isOwner?'Владелец':'Преподаватель';

let subjects=[],students=[],users=[];
const tabsDef=[{id:'students',label:'Ученики'},{id:'users',label:'Пользователи'}];
if(isOwner)tabsDef.push({id:'subjects',label:'Предметы'});
let curTab='students';

function renderTabs(){
    document.getElementById('tabs').innerHTML=tabsDef.map(t=>`<div class="tab${t.id===curTab?' active':''}" onclick="switchTab('${t.id}')">${t.label}</div>`).join('')}
function switchTab(t){curTab=t;renderTabs();renderContent()}

async function load(){
    subjects=await get('/api/subjects').catch(()=>[]);
    students=await get('/api/students').catch(()=>[]);
    if(isOwner||R==='tutor')users=await get('/api/users').catch(()=>[]);
    renderTabs();renderContent()}

function renderContent(){
    if(curTab==='students')renderStudents();
    else if(curTab==='users')renderUsers();
    else if(curTab==='subjects')renderSubjects()}

function renderStudents(){
    const c=document.getElementById('content');
    let h=`<div class="row"><button class="btn btn-p" onclick="openM('mStudent')">+ Ученик</button></div>`;
    if(!students.length){c.innerHTML=h+'<div class="empty">Нет учеников</div>';return}
    h+='<div class="grid">';
    for(const s of students){
        const g=s.goal==='ege'?'ЕГЭ':s.goal==='olymp'?'Олимп':'База';
        const gc=`goal-${s.goal}`;
        const subj=subjects.find(x=>x.id===s.subject_id);
        h+=`<div class="card" style="cursor:pointer" onclick="location.href='/student.html?id=${s.id}'">
<h3>${s.name}</h3>
<div class="meta">${s.grade} класс · <span class="goal ${gc}">${g}</span> · ${s.base_rate}₽${subj?' · '+subj.icon+' '+subj.name:''}</div>
</div>`}
    h+='</div>';c.innerHTML=h}

function renderUsers(){
    const c=document.getElementById('content');
    let h=`<div class="row"><button class="btn btn-p" onclick="openM('mUser')">+ Пользователь</button></div>`;
    const rl={owner:'👑 Владелец',tutor:'👨‍🏫 Преподаватель',student:'🎓 Ученик',parent:'👨‍👩‍👧 Родитель'};
    for(const u of users){
        const canDel=isOwner&&u.role!=='owner';
        h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">
<div><h3>${u.name}</h3><div class="meta">${rl[u.role]||u.role} · ${u.login}</div></div>
${canDel?`<button class="btn btn-d btn-sm" onclick="delUser('${u.id}')">✕</button>`:''}
</div></div>`}
    c.innerHTML=h}

function renderSubjects(){
    const c=document.getElementById('content');
    let h=`<div class="row"><input id="newSubjName" placeholder="Название"><input id="newSubjIcon" placeholder="Иконка" value="📐" style="width:60px"><button class="btn btn-p" onclick="addSubj()">+ Предмет</button></div>`;
    for(const s of subjects){
        h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center">
<div><h3>${s.icon} ${s.name}</h3></div>
<button class="btn btn-d btn-sm" onclick="delSubj('${s.id}')">✕</button>
</div></div>`}
    c.innerHTML=h}

function openM(id){document.getElementById(id).classList.add('show');
    if(id==='mStudent')fillSubjSelect('sSubject');
    if(id==='mUser'){fillSubjSelect('uSubject');fillStudentSelect();onRoleChange()}}
function closeM(id){document.getElementById(id).classList.remove('show')}

function fillSubjSelect(id){
    const s=document.getElementById(id);s.innerHTML=subjects.map(x=>`<option value="${x.id}">${x.icon} ${x.name}</option>`).join('');
    if(!subjects.length)s.innerHTML='<option value="">Нет предметов</option>'}
function fillStudentSelect(){
    const s=document.getElementById('uStudent');s.innerHTML='<option value="">—</option>'+students.map(x=>`<option value="${x.id}">${x.name}</option>`).join('')}
function onRoleChange(){
    const r=document.getElementById('uRole').value;
    document.getElementById('uTutorFields').style.display=r==='tutor'?'':'none';
    document.getElementById('uStudentFields').style.display=r==='student'?'':'none';
    document.getElementById('uParentFields').style.display=r==='parent'?'':'none';
    if(!isOwner)document.querySelector('#uRole option[value="tutor"]').disabled=true}

async function saveStudent(){
    try{
        const d={name:document.getElementById('sName').value,grade:document.getElementById('sGrade').value,
            goal:document.getElementById('sGoal').value,base_rate:+document.getElementById('sRate').value,
            format:document.getElementById('sFormat').value,subject_id:document.getElementById('sSubject').value||null};
        await post('/api/students',d);closeM('mStudent');await load();
    }catch(e){alert(e.detail||'Ошибка')}}

async function saveUser(){
    try{
        const r=document.getElementById('uRole').value;
        const d={role:r,name:document.getElementById('uName').value,login:document.getElementById('uLogin').value,
            password:document.getElementById('uPw').value};
        if(r==='tutor')d.subject_id=document.getElementById('uSubject').value||null;
        if(r==='student')d.student_id=document.getElementById('uStudent').value||null;
        if(r==='parent'){const v=document.getElementById('uChildren').value;d.children_ids=v?v.split(',').map(x=>x.trim()):[];}
        await post('/api/users',d);closeM('mUser');await load();
    }catch(e){alert(e.detail||'Ошибка')}}

async function delUser(id){if(confirm('Удалить?')){await del('/api/users/'+id);await load()}}
async function addSubj(){
    const n=document.getElementById('newSubjName').value,i=document.getElementById('newSubjIcon').value||'📐';
    if(!n)return;try{await post('/api/subjects',{name:n,icon:i});await load()}catch(e){alert(e.detail||'Ошибка')}}
async function delSubj(id){if(confirm('Удалить предмет?')){await del('/api/subjects/'+id);await load()}}

load();
</script></body></html>
